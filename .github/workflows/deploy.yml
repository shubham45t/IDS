name: Deploy DevSecOps IDS Platform

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          # Path to project directory on the remote server
          script: |
            cd /path/to/deployment/dir/IDS
            git pull origin main
            docker-compose up -d --build --remove-orphans ids backend dashboard
            docker-compose ps
            echo "Deployment successful! IDS is running."
